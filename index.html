<style>

// Tokenize
function tok(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w))}
function buildV(chunks,mx=50){const df={};chunks.forEach(c=>{const s=new Set();tok(c).forEach(w=>{if(!s.has(w)){df[w]=(df[w]||0)+1;s.add(w)}})});return Object.entries(df).filter(([,f])=>f<chunks.length*.9).sort((a,b)=>b[1]-a[1]).slice(0,mx).map(([w])=>w)}
function buildIDF(ch,v){const N=ch.length,df={};ch.forEach(c=>{const s=new Set(tok(c));v.forEach(w=>{if(s.has(w))df[w]=(df[w]||0)+1})});return v.map(w=>Math.log((N+1)/(1+(df[w]||0))))}
function norm(v){const m=Math.sqrt(v.reduce((a,x)=>a+x*x,0));return m>0?v.map(x=>x/m):v}
function eTFIDF(t,v,idf){const ts=tok(t),tf={};ts.forEach(t=>{tf[t]=(tf[t]||0)+1});return v.map((w,i)=>{const r=tf[w]||0;return r>0?(1+Math.log(r))*(idf[i]||1):0})}
function eBOW(t,v){const s=new Set(tok(t));return v.map(w=>s.has(w)?1:0)}
function eBM25(t,v,ad,idf){const ts=tok(t),tf={},dl=ts.length,k1=1.2,b=.75;ts.forEach(t=>{tf[t]=(tf[t]||0)+1});return v.map((w,i)=>{const f=tf[w]||0;return f>0?(idf[i]||1)*((f*(k1+1))/(f+k1*(1-b+b*(dl/(ad||1))))):0})}
function eTFBIN(t,v,idf){const s=new Set(tok(t));return v.map((w,i)=>s.has(w)?(idf[i]||1):0)}

function cosS(a,b){let d=0,ma=0,mb=0;for(let i=0;i<a.length;i++){d+=a[i]*b[i];ma+=a[i]*a[i];mb+=b[i]*b[i]}return(ma===0||mb===0)?0:d/(Math.sqrt(ma)*Math.sqrt(mb))}

// Chunking
function cP(t){return t.split(/\n\n+/).map(p=>p.trim()).filter(p=>p.length>20)}
function cS(t,n=3){const s=t.match(/[^.!?]+[.!?]+/g)||[t];const c=[];for(let i=0;i<s.length;i+=n){const x=s.slice(i,i+n).join(' ').trim();if(x.length>10)c.push(x)}return c}
function cF(t,sz=500,ov=100){const c=[];let i=0;while(i<t.length){const x=t.slice(i,Math.min(i+sz,t.length)).trim();if(x.length>10)c.push(x);i+=sz-ov}return c}
function cH(t){const l=t.split('\n'),c=[];let cur=[];for(const x of l){const hd=x.trim().length>0&&x.trim().length<60&&(/^[A-Z][A-Za-z\s—\-:,&]+$/.test(x.trim())||/^#+\s/.test(x.trim()));if(hd&&cur.length){const tx=cur.join('\n').trim();if(tx.length>20)c.push(tx);cur=[x]}else cur.push(x)}if(cur.length){const tx=cur.join('\n').trim();if(tx.length>20)c.push(tx)}return c.length?c:cP(t)}
function cCA(t){const ss=t.match(/[^.!?]+[.!?]+/g)||[t];if(ss.length<=2)return cP(t);const allW=[...new Set(ss.flatMap(s=>tok(s)))].slice(0,300);function tv(s){const ct={};tok(s).forEach(w=>ct[w]=(ct[w]||0)+1);const v=allW.map(w=>ct[w]||0);const l=Math.sqrt(v.reduce((a,x)=>a+x*x,0));return l>0?v.map(x=>x/l):v}const vs=ss.map(tv);const sims=vs.slice(1).map((v,i)=>cosS(vs[i],v));const avg=sims.reduce((a,x)=>a+x,0)/sims.length;const std=Math.sqrt(sims.reduce((a,x)=>a+(x-avg)**2,0)/sims.length);const thr=Math.max(0,avg-std);const chunks=[];let cur=[ss[0]];sims.forEach((sim,i)=>{if(sim<thr){const tx=cur.join(' ').trim();if(tx.length>20)chunks.push(tx);cur=[ss[i+1]]}else cur.push(ss[i+1])});if(cur.length){const tx=cur.join(' ').trim();if(tx.length>20)chunks.push(tx)}return chunks.length?chunks:cP(t)}
function doChunk(){const m={paragraph:cP,sentence:t=>cS(t,3),fixed:t=>cF(t,500,100),section:cH,context:cCA};ST.ch=(m[ST.cm]||cP)(ST.clean)}

// PCA
function doProject(){
    const vecs=ST.emb.map(e=>e.vector);if(!vecs.length){ST.proj=[];return}
    const dim=vecs[0].length,n=vecs.length;
    const mean=new Array(dim).fill(0);vecs.forEach(v=>v.forEach((x,i)=>mean[i]+=x));mean.forEach((_,i)=>mean[i]/=n);
    const cen=vecs.map(v=>v.map((x,i)=>x-mean[i]));
    function pw(mat,ex){let r=new Array(dim).fill(0).map(()=>Math.random()-.5);if(ex){const d=r.reduce((a,x,i)=>a+x*ex[i],0);r=r.map((x,i)=>x-d*ex[i])}let nm=Math.sqrt(r.reduce((a,x)=>a+x*x,0));r=r.map(x=>x/(nm||1));for(let it=0;it<30;it++){const nr=new Array(dim).fill(0);mat.forEach(row=>{const d=row.reduce((a,x,i)=>a+x*r[i],0);row.forEach((x,i)=>nr[i]+=d*x)});if(ex){const d=nr.reduce((a,x,i)=>a+x*ex[i],0);nr.forEach((_,i)=>nr[i]-=d*ex[i])}nm=Math.sqrt(nr.reduce((a,x)=>a+x*x,0));r=nr.map(x=>x/(nm||1))}return r}
    const p1=pw(cen,null),p2=pw(cen,p1);
    ST._p1=p1;ST._p2=p2;ST._m=mean;
    ST.proj=cen.map((v,idx)=>({x:v.reduce((a,x,i)=>a+x*p1[i],0),y:v.reduce((a,x,i)=>a+x*p2[i],0),chunkIdx:idx}));
}
function projQ(qv){if(!ST._p1)return null;const c=qv.map((x,i)=>x-(ST._m[i]||0));return{x:c.reduce((a,x,i)=>a+x*(ST._p1[i]||0),0),y:c.reduce((a,x,i)=>a+x*(ST._p2[i]||0),0)}}

async function computeEmbed(){
    const m=ST.em;
    if(m==='llm'){
        if(!ST.ak){alert('Add a Jina API key on the Input step first.');return}
        ST.ll=true;R();
        try{const vs=await eLLM(ST.ch);ST.emb=vs.map((v,i)=>({chunkIdx:i,vector:v}));ST.voc=[];ST.ld=vs[0]?.length||0}catch(e){alert('API error: '+e.message);}
        ST.ll=false;
    }else if(m==='local'){
        ST.ll=true;ST.lp='Loading model…';R();
        try{const vs=await eLocal(ST.ch);ST.emb=vs.map((v,i)=>({chunkIdx:i,vector:v}));ST.voc=[];ST.ld=vs[0]?.length||0}catch(e){alert('Local model error: '+e.message);}
        ST.ll=false;ST.lp='';
    }else{
        ST.voc=buildV(ST.ch,50);const idf=buildIDF(ST.ch,ST.voc);const ad=ST.ch.reduce((a,c)=>a+tok(c).length,0)/(ST.ch.length||1);
        if(m==='tfidf')ST.emb=ST.ch.map((c,i)=>({chunkIdx:i,vector:norm(eTFIDF(c,ST.voc,idf))}));
        else if(m==='bow')ST.emb=ST.ch.map((c,i)=>({chunkIdx:i,vector:norm(eBOW(c,ST.voc))}));
        else if(m==='bm25')ST.emb=ST.ch.map((c,i)=>({chunkIdx:i,vector:norm(eBM25(c,ST.voc,ad,idf))}));
        else if(m==='tfidf-bin')ST.emb=ST.ch.map((c,i)=>({chunkIdx:i,vector:norm(eTFBIN(c,ST.voc,idf))}));
        ST.ld=0;
    }
    doProject();R();setTimeout(drawC,60);
}

function drawC(){

    canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);
    if(!ST.proj.length)return;const pad=56;const ap=[...ST.proj];if(ST.qp)ap.push(ST.qp);

    const mx2=(qs.sx+ps.sx)/2,my2=(qs.sy+ps.sy)/2;ctx.font='600 9px "Geist Mono",monospace';ctx.fillStyle='rgba(22,163,74,.9)';ctx.fillText((r.score*100).toFixed(0)+'%',mx2+4,my2-4)})}
    // Points

    if(isR){ctx.beginPath();ctx.arc(sx,sy,r+5,0,Math.PI*2);ctx.fillStyle='rgba(22,163,74,.12)';ctx.fill()}

chunk(){
    let seg=[],pos=0;ST.ch.forEach((ch,i)=>{const idx=ST.clean.indexOf(ch,pos);if(idx>=0){if(idx>pos)seg.push({t:ST.clean.slice(pos,idx),i:-1});seg.push({t:ch,i});pos=idx+ch.length}});if(pos<ST.clean.length)seg.push({t:ST.clean.slice(pos),i:-1});
    const inl=seg.map(s=>s.i<0?`<span style="color:var(--text-ghost)">${h(s.t)}</span>`:`<span class="cs c${s.i%6}" title="Chunk ${s.i+1}">${h(s.t)}</span>`).join('');
    const cards=ST.ch.map((c,i)=>`<div class="cc cb${i%6}"><div class="ci"><span>Chunk ${i+1}</span><span>${c.length} ch</span></div><div class="ct">${h(c)}</div><div class="cm"><span class="tg">${ST.cm}</span><span class="tg">${Math.ceil(c.split(/\s+/).length)}w</span></div></div>`).join('');
    const CHDEF={
        paragraph:{icon:'¶',name:'Paragraph',desc:'Splits on blank lines (\\u{000A}\\u{000A}). Each paragraph becomes one chunk, preserving natural document structure like headings with their body text.',pro:'Maintains semantic coherence per section',con:'Highly variable chunk sizes (50–2000+ chars)',tip:'Best for: articles, reports, business docs'},
        sentence:{icon:'S',name:'Sentence (3)',desc:'Detects sentence boundaries (. ! ?) and groups 3 consecutive sentences per chunk. Sliding window can be adjusted.',pro:'Consistent granularity, precise retrieval',con:'May split related ideas across chunk groups',tip:'Best for: QA systems, dense factual content'},
        fixed:{icon:'#',name:'Fixed 500ch',desc:'Hard 500-character windows with 100-char overlap to preserve context at boundaries. Completely ignores sentence or paragraph structure.',pro:'Predictable size, simple overlap for context',con:'Splits mid-sentence; loses semantic units',tip:'Best for: when uniform chunk size is critical'},
        section:{icon:'§',name:'Section',desc:'Detects ALL-CAPS headers or short title-case lines as section delimiters, grouping all content under each heading into one chunk.',pro:'Respects document headings and hierarchy',con:'Requires clear heading structure in source',tip:'Best for: manuals, technical docs, wikis'},
        context:{icon:'~',name:'Context-Aware',desc:'Embeds each sentence with TF vectors, measures cosine similarity between consecutive sentences, then splits at semantic breakpoints (adaptive threshold: mean − σ of similarities).',pro:'Groups semantically coherent ideas regardless of formatting',con:'Slower; TF vectors may miss deep semantic shifts',tip:'Best for: mixed-format docs, articles with implicit topic shifts'}
    };
    const defCards=Object.entries(CHDEF).map(([key,d])=>`<div class="def-card${ST.cm===key?' active':''}"><div class="def-card-name"><span style="font-family:var(--font-mono);font-size:.9rem;opacity:.6">${d.icon}</span> ${d.name}</div><div class="def-card-desc">${d.desc}</div><div class="def-pros-cons"><span class="pro">✓ ${d.pro}</span><span class="con">✗ ${d.con}</span></div><div class="def-card-meta">${d.tip}</div></div>`).join('');
    return`<div class="sh"><div class="sn">Step 3 of 8</div><h2 class="st">Chunking</h2><p class="sd">Split the document into retrievable units. Switch strategies to compare how boundaries change.</p></div>
    <div class="pn"><div class="ph"><span class="pl">Strategy</span><span style="font-family:var(--font-mono);font-size:.68rem;color:var(--text-dim)">${ST.ch.length} chunks</span></div>
    <div class="pb"><div class="sp">${['paragraph','sentence','fixed','section','context'].map(m=>`<button class="pill${ST.cm===m?' on':''}" onclick="ST.cm='${m}';doChunk();R()">${m==='sentence'?'Sentence (3)':m==='fixed'?'Fixed 500ch':m==='context'?'Context-Aware':m[0].toUpperCase()+m.slice(1)}</button>`).join('')}</div>
    <div class="sr"><div class="sb"><div class="sv2">${ST.ch.length}</div><div class="sl">Chunks</div></div><div class="sb"><div class="sv2">${ST.ch.length?Math.round(ST.ch.reduce((a,c)=>a+c.length,0)/ST.ch.length):0}</div><div class="sl">Avg Chars</div></div></div></div></div>
    <div class="pn"><div class="ph"><span class="pl">Strategy Definitions</span><span style="font-size:.68rem;color:var(--text-dim);font-family:var(--font-mono)">active highlighted</span></div><div class="pb"><div class="def-grid">${defCards}</div></div></div>
    <div class="pn"><div class="ph"><span class="pl">Boundaries</span></div><div class="pb"><div class="ht" style="max-height:200px;overflow-y:auto">${inl}</div></div></div>
    <div class="pn"><div class="ph"><span class="pl">Chunks</span></div><div class="pb"><div class="cg">${cards}</div></div></div>
    <div class="ins ins-o"><span class="ins-i">⚠️</span><div><strong>Switch strategies</strong> and notice how boundaries change. Paragraph preserves natural units. Sentence gives granularity. Fixed can split mid-sentence. Section respects headings.</div></div>
    <div class="br"><button class="btn bs" onclick="go(1)">← Back</button><button class="btn bp" onclick="doEmbed()">Generate Embeddings →</button></div>`},

embed(){
    const hasApi=!!ST.ak;
    const dims=(ST.em==='llm'||ST.em==='local')?ST.ld:ST.voc.length;
    const ml={tfidf:'TF-IDF',bow:'Bag of Words',bm25:'BM25','tfidf-bin':'TF-IDF Binary',llm:'Jina AI (Neural)',local:'In-Browser Neural'}[ST.em]||ST.em;
    const isLLM=ST.em==='llm'||ST.em==='local';

    // Loading state
    if(ST.ll){
        const isLocal=ST.em==='local';
        const prog=ST.lp||'';
        const pct=prog.match(/(\d+)%/)?.[1];
        const loadMsg=isLocal
            ?`<div style="text-align:center;padding:2.5rem">
                <div class="ld" style="width:28px;height:28px;border-width:3px;margin:0 auto .8rem"></div>
                <p style="color:var(--text-dim);font-weight:500">${prog||'Loading MiniLM model into browser…'}</p>
                ${pct?`<div style="margin:.8rem auto 0;max-width:240px;height:6px;background:var(--bg-raised);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--cyan);border-radius:3px;transition:width .3s"></div></div>`:''}
                <p style="font-size:.75rem;color:var(--text-ghost);margin-top:.6rem">~25 MB download · cached after first load · no API key needed</p>

        return`<div class="sh"><div class="sn">Step 4 of 8</div><h2 class="st">Vector Embeddings & Space</h2></div><div class="pn"><div class="pb">${loadMsg}</div></div>`;
    }

    // Embedding strategy definitions
    const EMDEF={
        tfidf:{name:'TF-IDF',type:'Sparse',typeCls:'sparse',desc:'Term Frequency × Inverse Document Frequency. Words frequent in a chunk but rare across the corpus receive high weight, surfacing discriminative terms.',pros:['Fast, no training required','Strong keyword retrieval baseline'],cons:['Misses synonyms and semantics','Vocabulary fixed at index time']},
        bow:{name:'Bag of Words',type:'Sparse',typeCls:'sparse',desc:'Binary vector: each dimension is 1 if the vocabulary term is present, 0 otherwise. No frequency or positional information—pure presence/absence.',pros:['Extremely simple and transparent','Zero hyperparameters'],cons:['No frequency signal','Treats "run" and "running" as different words']},
        bm25:{name:'BM25',type:'Sparse',typeCls:'sparse',desc:'Probabilistic ranking function used by Elasticsearch and Lucene. Extends TF-IDF with term saturation (k₁) and document length normalization (b).',pros:['Outperforms TF-IDF in practice','Length-normalized, saturates high TF'],cons:['Still keyword-only retrieval','Sensitive to k₁/b hyperparameters']},
        'tfidf-bin':{name:'TF-IDF Binary',type:'Sparse',typeCls:'sparse',desc:'IDF weighting combined with binary term frequency—a hybrid of TF-IDF and BOW. Useful when repeated terms in a chunk should not inflate weight.',pros:['IDF signal without over-weighting repetition','Interpretable like TF-IDF'],cons:['Loses within-document frequency signal','Marginal improvement over BOW in practice']},
        llm:{name:'Jina AI Embeddings',type:'Dense',typeCls:'dense',desc:'Jina AI\'s jina-embeddings-v3 model maps each chunk to a 1024-dim dense vector encoding deep semantic features. Captures synonyms, context, and conceptual similarity. Requires a Jina API key (1M tokens free).',pros:['True semantic understanding','Handles synonyms, paraphrases, multilingual'],cons:['Requires Jina API key','Network call per batch']},
        local:{name:'In-Browser Neural',type:'Dense',typeCls:'dense',desc:'Runs all-MiniLM-L6-v2 (a 22M-parameter transformer) directly in your browser via Transformers.js + WebAssembly. The model (~25 MB) downloads once and is cached. No API key, no server — the neural network runs entirely on your device.',pros:['100% free, no API key needed','Works offline after first load','Real neural embeddings, 384 dimensions'],cons:['~25 MB download on first use','Slower than server-side for large batches','Smaller model than cloud APIs']}
    };
    const defCards=Object.entries(EMDEF).map(([key,d])=>`<div class="def-card${ST.em===key?' active':''}"><div class="def-card-name">${d.name} <span class="type-badge ${d.typeCls}">${d.type}</span></div><div class="def-card-desc">${d.desc}</div><div class="def-pros-cons">${d.pros.map(p=>`<span class="pro">✓ ${p}</span>`).join('')}${d.cons.map(c=>`<span class="con">✗ ${c}</span>`).join('')}</div></div>`).join('');

    // Dense vs Sparse panel
    const firstVec=ST.emb[0]?.vector||[];

    // Build bar charts for sparse and dense illustration
    let sparseBarHTML='',denseBarHTML='';

    }
    if(firstVec.length>0&&isLLM){
        const dv=firstVec.slice(0,50);const dmx=Math.max(...dv.map(Math.abs),.001);
        denseBarHTML=dv.map(val=>{const ht=Math.max(3,(Math.abs(val)/dmx)*32);const hu=val>=0?145:0;return`<div class="b" style="height:${ht}px;background:hsl(${hu},60%,50%)"></div>`}).join('');

        denseBarHTML=seed.map(v=>{const ht=Math.max(3,v*32);return`<div class="b" style="height:${ht}px;background:hsl(145,55%,45%)"></div>`}).join('');

    const sparseDims=isLLM?50:totalDims;const sparseNZVal=isLLM?3:sparseNZ;

    const sd=Math.min(dims||50,50);
    const rows=ST.emb.slice(0,8).map((e,i)=>{const v=e.vector.slice(0,sd);const mx=Math.max(...v.map(Math.abs),.001);const bars=v.map(val=>{const ht=Math.max(2,(Math.abs(val)/mx)*30);const hu=val>=0?210:25;const lt=65-Math.abs(val)/mx*25;return`<div class="vba" style="height:${ht}px;background:hsl(${hu},75%,${lt}%)"></div>`}).join('');const nums=e.vector.slice(0,6).map(v=>v.toFixed(3)).join(' ');return`<div class="vr"><span class="vl">Ch ${i+1}</span><div class="vb">${bars}</div><div class="vn">[${nums}…]</div></div>`}).join('');

    // Vector stores
    const VS=[
        {name:'Pinecone',type:'cloud',typeLabel:'Managed Cloud',desc:'Fully managed, serverless vector database. Zero infrastructure, real-time upserts, metadata filtering, and horizontal scaling. Dominant choice for production RAG.'},
        {name:'Weaviate',type:'oss',typeLabel:'Open-source',desc:'Vector search engine with a built-in schema and module ecosystem (OpenAI, Cohere, HuggingFace). Supports hybrid dense+sparse search natively.'},
        {name:'FAISS',type:'lib',typeLabel:'Library (Meta)',desc:'In-process library for billion-scale nearest-neighbor search. No server — runs inside your application. Fastest option for pure ANN with no metadata filtering needs.'},
        {name:'Chroma',type:'oss',typeLabel:'Open-source',desc:'Developer-friendly embedded vector database built for AI apps. Works fully in-memory, can persist to disk, and integrates with LangChain and LlamaIndex out of the box.'},
        {name:'Qdrant',type:'oss',typeLabel:'Open-source / Cloud',desc:'High-performance vector database in Rust. Combines rich payload filtering with fast ANN search. Supports sparse vectors, named vectors, and quantization.'},
        {name:'pgvector',type:'ext',typeLabel:'PostgreSQL Ext.',desc:'Add vector similarity search to your existing PostgreSQL database. Keep embeddings co-located with your relational data and query with SQL.'}
    ];
    const vsCards=VS.map(v=>`<div class="vs-card"><div class="vs-card-name">${v.name}</div><span class="vs-type ${v.type}">${v.typeLabel}</span><div class="vs-desc">${v.desc}</div></div>`).join('');

    return`<div class="sh"><div class="sn">Step 4 of 8</div><h2 class="st">Vector Embeddings & Space</h2><p class="sd">Each chunk is converted into a number vector — its position in a high-dimensional space. Sparse methods count words; dense neural models encode meaning. Try <strong>In-Browser Neural</strong> to run a real transformer model locally, no API key needed.</p></div>
    <div class="pn"><div class="ph"><span class="pl">Embedding Method</span><span style="font-family:var(--font-mono);font-size:.68rem;color:var(--text-dim)">${ml} · ${isLLM?'dense':'sparse'}</span></div><div class="pb">
    <div class="sp">
    <button class="pill${ST.em==='tfidf'?' on':''}" onclick="ST.em='tfidf';computeEmbed()">TF-IDF</button>
    <button class="pill${ST.em==='bow'?' on':''}" onclick="ST.em='bow';computeEmbed()">Bag of Words</button>
    <button class="pill${ST.em==='bm25'?' on':''}" onclick="ST.em='bm25';computeEmbed()">BM25</button>
    <button class="pill${ST.em==='tfidf-bin'?' on':''}" onclick="ST.em='tfidf-bin';computeEmbed()">TF-IDF Binary</button>

    <button class="pill llm${ST.em==='local'?' on':''}" onclick="ST.em='local';computeEmbed()">In-Browser Neural ✦</button>
    </div>

    </div></div>
    <div class="pn"><div class="ph"><span class="pl">Strategy Definitions</span><span style="font-size:.65rem;color:var(--text-dim);font-family:var(--font-mono)">active highlighted</span></div><div class="pb"><div class="def-grid">${defCards}</div></div></div>
    <div class="sr"><div class="sb"><div class="sv2">${ST.emb.length||'—'}</div><div class="sl">Vectors</div></div><div class="sb"><div class="sv2">${dims||'—'}</div><div class="sl">Dimensions</div></div><div class="sb"><div class="sv2">${isLLM?'Dense':'Sparse'}</div><div class="sl">Type</div></div><div class="sb"><div class="sv2">${isLLM?'0%':ST.emb.length?Math.round((1-(ST.emb[0]?.vector.filter(v=>Math.abs(v)>1e-10).length||0)/(ST.emb[0]?.vector.length||1))*100)+'%':'—'}</div><div class="sl">Sparsity</div></div></div>
    <div class="pn"><div class="ph"><span class="pl">Sparse vs Dense Vectors</span></div><div class="pb">

    </div>

        <div class="ds-stat-row">
            <div class="ds-stat"><div class="ds-stat-val">${isLLM?denseNZVal:1536}</div><div class="ds-stat-lbl">Non-zero dims</div></div>
            <div class="ds-stat"><div class="ds-stat-val">${isLLM?'0%':'~0%'}</div><div class="ds-stat-lbl">Sparsity</div></div>
            <div class="ds-stat"><div class="ds-stat-val">${isLLM?denseDims:1536}</div><div class="ds-stat-lbl">Total dims</div></div>
        </div>
        <div class="ds-bars">${denseBarHTML}</div>

    </div>
    </div></div></div>
    ${vocH}
    ${ST.emb.length?`<div class="pn"><div class="ph"><span class="pl">Chunk Vectors</span><span style="font-family:var(--font-mono);font-size:.62rem;color:var(--text-ghost)">${sd} of ${dims||'?'} dims shown</span></div>
    <div class="pb" style="max-height:300px;overflow-y:auto">${rows}${ST.emb.length>8?`<div style="text-align:center;color:var(--text-ghost);font-size:.78rem;padding:.6rem 0">… +${ST.emb.length-8} more</div>`:''}</div></div>`:''}
    ${ST.proj.length?`<div class="pn"><div class="ph"><span class="pl">2D Embedding Space (PCA)</span><span style="font-family:var(--font-mono);font-size:.62rem;color:var(--text-ghost)">${ST.proj.length} chunks${ST.qp?' · query shown':''} · hover to inspect</span></div>
    <div class="pb" style="padding:.4rem"><div class="ew" id="ew" style="min-height:400px"><canvas id="cv"></canvas>
    <div class="el"><span><span class="ed" style="background:var(--cyan)"></span>Chunks</span>${ST.qp?'<span><span class="ed" style="background:var(--orange)"></span>Query</span>':''}${ST.ret.length?'<span><span class="ed" style="background:var(--green)"></span>Retrieved</span>':''}</div>
    </div></div></div>`:`<div class="pn"><div class="pb" style="text-align:center;padding:1.8rem;color:var(--text-ghost)">Select an embedding method above to generate vectors and see the embedding space.</div></div>`}
    <div class="pn"><div class="ph"><span class="pl">Where do embeddings get stored?</span><span style="font-size:.65rem;color:var(--text-dim);font-family:var(--font-mono)">Vector Stores</span></div><div class="pb">
    <div class="vs-grid">${vsCards}</div>
    <div class="ins ins-c" style="margin-top:.8rem;margin-bottom:0"><span class="ins-i">💡</span><div style="font-size:.8rem"><strong>In this tool</strong> embeddings live in browser memory. Production RAG indexes them into a vector store for millisecond retrieval at scale.</div></div>
    </div></div>
    <div class="br"><button class="btn bs" onclick="go(2)">← Back</button><button class="btn bp" onclick="nx()">Enter Query →</button></div>`},

query(){return`<div class="sh"><div class="sn">Step 5 of 8</div><h2 class="st">Query</h2><p class="sd">Ask a question. It gets embedded with the same method, then compared against every chunk in vector space.</p></div>
    <div class="pn"><div class="ph"><span class="pl">Your Question</span></div><div class="pb">
    <input class="qi" id="qIn" type="text" placeholder="e.g. What was the revenue growth?" value="${ha(ST.q)}">
    <div class="br" style="flex-wrap:wrap"><button class="btn bp" onclick="doQuery()">Search →</button>
    <button class="bg" onclick="document.getElementById('qIn').value='What was the total revenue and growth rate?'">Revenue</button>
    <button class="bg" onclick="document.getElementById('qIn').value='What caused customer churn?'">Churn</button>
    <button class="bg" onclick="document.getElementById('qIn').value='What new product features were shipped?'">Features</button>
    <button class="bg" onclick="document.getElementById('qIn').value='What is the financial outlook?'">Outlook</button>
    </div></div></div>
    ${ST.qv.length?renderQV():''}
    <div class="ins ins-c"><span class="ins-i">💡</span><div><strong>Same vector space:</strong> The query is embedded using the identical method as the chunks. This shared space is what makes similarity comparison meaningful.</div></div>
    <div class="br"><button class="btn bs" onclick="go(3)">← Back to Space</button></div>`},

retrieve(){
    if(!ST.sim.length)return`<div class="sh"><div class="sn">Step 6 of 8</div><h2 class="st">Retrieval</h2></div><div class="es">No query yet.</div><div class="br"><button class="btn bs" onclick="go(4)">← Back</button></div>`;
    const mx=Math.max(ST.sim[0].score,.001);
    const res=ST.sim.map((s,i)=>{const isT=i<ST.k;const pct=Math.max(0,Math.round((s.score/mx)*100));const ch=ST.ch[s.chunkIdx];const pv=ch.length>120?ch.slice(0,120)+'…':ch;return`<div class="smr${isT?' top':''}"><span class="smrk">#${i+1}</span><div class="sbw"><div class="sbb" style="width:${pct}%"></div></div><span class="sms">${(s.score*100).toFixed(1)}%</span><div class="smt">${h(pv)}</div></div>`}).join('');
    return`<div class="sh"><div class="sn">Step 6 of 8</div><h2 class="st">Retrieval</h2><p class="sd">Cosine similarity ranks all chunks. The space shows query → nearest neighbors with scores.</p></div>
    <div class="pn"><div class="ph"><span class="pl">Embedding Space — Query vs Chunks</span></div><div class="pb" style="padding:.4rem"><div class="ew" id="ew" style="min-height:380px"><canvas id="cv"></canvas>
    <div class="el"><span><span class="ed" style="background:var(--cyan)"></span>Chunks</span><span><span class="ed" style="background:var(--orange)"></span>Query</span><span><span class="ed" style="background:var(--green)"></span>Retrieved</span></div>
    </div></div></div>
    <div class="slr"><span class="sll">Top-K:</span><input type="range" min="1" max="${Math.min(ST.ch.length,8)}" value="${ST.k}" oninput="updK(this.value)"><span class="slv" id="kv">${ST.k}</span></div>
    <div class="pn"><div class="ph"><span class="pl">Ranked</span><span style="font-family:var(--font-mono);font-size:.68rem;color:var(--orange)">Top ${ST.k}</span></div>
    <div class="pb" id="sR">${res}</div></div>
    <div class="br"><button class="btn bs" onclick="go(4)">← Back</button><button class="btn bp" onclick="nx()">Context →</button></div>`},

context(){
    if(!ST.ret.length)return`<div class="sh"><div class="sn">Step 7 of 8</div><h2 class="st">Context Assembly</h2></div><div class="es">No results.</div>`;
    const ev=ST.ret.map((r,i)=>`[Evidence ${i+1}] (Chunk ${r.chunkIdx+1}, ${(r.score*100).toFixed(1)}%)\n${ST.ch[r.chunkIdx]}`).join('\n\n');
    const tk=Math.ceil(ev.split(/\s+/).length*1.3);
    const pm=`<span class="sy">SYSTEM:</span>\n<span class="ix">Answer using ONLY the evidence below. Cite evidence numbers. If insufficient, say so.</span>\n\n<span class="dm">───────────────────</span>\n\n<span class="sy">EVIDENCE:</span>\n\n<span class="cx">${h(ev)}</span>\n\n<span class="dm">───────────────────</span>\n\n<span class="sy">QUERY:</span>\n<span class="qy">${h(ST.q)}</span>\n\n<span class="ix">Cite evidence. Abstain if insufficient.</span>`;
    return`<div class="sh"><div class="sn">Step 7 of 8</div><h2 class="st">Context Assembly</h2><p class="sd">Retrieved chunks assembled into a structured prompt with grounding instructions.</p></div>
    <div class="sr"><div class="sb"><div class="sv2">${ST.ret.length}</div><div class="sl">Evidence</div></div><div class="sb"><div class="sv2">~${tk}</div><div class="sl">Est. Tokens</div></div></div>
    <div class="pn"><div class="ph"><span class="pl">Prompt</span><span style="font-family:var(--font-mono);font-size:.58rem;color:var(--text-ghost)"><span style="color:var(--purple)">■</span>sys <span style="color:var(--cyan)">■</span>instr <span style="color:var(--green)">■</span>evidence <span style="color:var(--orange)">■</span>query</span></div>
    <div class="pb"><div class="pb2">${pm}</div></div></div>
    <div class="br"><button class="btn bs" onclick="go(5)">← Back</button><button class="btn bp" onclick="nx()">Output →</button></div>`},

generate(){
    const tc=ST.ret.map(r=>({idx:r.chunkIdx+1,text:ST.ch[r.chunkIdx],score:r.score}));
    let ans='Based on the available evidence:\n\n';
    tc.forEach(c=>{const s=c.text.match(/[^.!?]+[.!?]+/g)||[c.text];ans+=h(s.slice(0,3).join(' ').trim())+` <span class="cit">[Evidence ${c.idx}]</span>\n\n`});
    const avg=tc.reduce((a,c)=>a+c.score,0)/tc.length;
    if(avg<.1)ans+=`\n<em style="color:var(--orange)">Low relevance — consider refining the query.</em>`;
    const hasNemotron=ST.gp==='openrouter'&&!!ST.gk;
    const nemotronSection=ST.gl
        ?`<div class="pn"><div class="pb" style="text-align:center;padding:1.8rem"><div class="ld" style="width:22px;height:22px;border-width:3px;margin:0 auto .6rem"></div><p style="color:var(--text-dim)">Calling NVIDIA Nemotron via OpenRouter…</p></div></div>`
        :ST.gr
            ?`<div class="pn"><div class="ph"><span class="pl">Answer (NVIDIA Nemotron 3 Super Free)</span><span class="app-badge" style="font-size:.5rem">OpenRouter</span></div><div class="pb"><div class="go" style="white-space:pre-wrap">${h(ST.gr)}</div><div style="text-align:right;margin-top:.4rem"><button class="btn bs" style="font-size:.72rem" onclick="ST.gr='';doGenerateReal()">↺ Regenerate</button></div></div></div>`
            :hasNemotron
                ?`<div class="pn"><div class="pb" style="padding:1.2rem"><button class="btn bp" onclick="doGenerateReal()">✨ Generate with NVIDIA Nemotron Free</button><p style="font-size:.75rem;color:var(--text-dim);margin-top:.5rem">Uses your OpenRouter API key · <span style="font-family:var(--font-mono)">nvidia/nemotron-3-super-120b-a12b:free</span></p></div></div>`
                :`<div class="ins ins-o"><span class="ins-i">💡</span><div>Select <strong>OpenRouter (Nemotron)</strong> on the Input step and add an OpenRouter API key to get a real AI-generated answer here.</div></div>`;
    return`<div class="sh"><div class="sn">Step 8 of 8</div><h2 class="st">Generation</h2><p class="sd">The model produces a grounded answer with citations back to evidence.</p></div>
    <div class="pn"><div class="ph"><span class="pl">Query</span></div><div class="pb"><div style="font-family:var(--font-mono);font-size:.85rem;color:var(--orange)">"${h(ST.q)}"</div></div></div>
    <div class="fa">↓</div>
    <div class="pn"><div class="ph"><span class="pl">Answer (Simulated)</span><span class="app-badge" style="font-size:.5rem">Model Agnostic</span></div><div class="pb"><div class="go">${ans}</div></div></div>
    <div class="ins ins-o"><span class="ins-i">⚠️</span><div><strong>Simulated.</strong> A real LLM would synthesize naturally. This shows which evidence the model draws from.</div></div>
    ${nemotronSection}
    <div class="pn"><div class="ph"><span class="pl">Evidence Trace</span></div><div class="pb">${ST.ret.map((r,i)=>`<div style="margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.2rem"><span class="cit">[Ev ${i+1}]</span><span style="font-family:var(--font-mono);font-size:.65rem;color:var(--text-dim)">Chunk ${r.chunkIdx+1} · ${(r.score*100).toFixed(1)}%</span></div><div style="font-size:.8rem;color:var(--text-dim);line-height:1.5">${h(ST.ch[r.chunkIdx].slice(0,200))}${ST.ch[r.chunkIdx].length>200?'…':''}</div></div>`).join('')}</div></div>
    <div class="ins ins-p"><span class="ins-i">🎓</span><div><strong>Full pipeline complete!</strong> Go back to any step to experiment with different inputs, chunking, embedding methods, or queries.</div></div>
    <div class="br"><button class="btn bs" onclick="go(6)">← Back</button><button class="btn bp" onclick="resetAll()">🔄 Start Over</button><button class="btn bs" onclick="go(4)">New Query</button></div>`}
};

function doIngest(){ST.raw=document.getElementById('docIn').value.trim();if(!ST.raw)return;ST.clean=ST.raw.replace(/[\r\n]{3,}/g,'\n\n').replace(/[ \t]+/g,' ').replace(/^ +| +$/gm,'').trim();nx()}
function renderQV(){const v=ST.qv.slice(0,Math.min(50,ST.qv.length));const mx=Math.max(...v.map(Math.abs),.001);const bars=v.map(val=>{const ht=Math.max(2,(Math.abs(val)/mx)*30);return`<div class="vba" style="height:${ht}px;background:hsl(25,75%,${60-Math.abs(val)/mx*25}%)"></div>`}).join('');const nums=ST.qv.slice(0,6).map(v=>v.toFixed(3)).join(' ');return`<div class="pn" style="margin-top:.9rem"><div class="ph"><span class="pl">Query Vector</span></div><div class="pb"><div style="font-family:var(--font-mono);font-size:.83rem;color:var(--orange);margin-bottom:.5rem">"${h(ST.q)}"</div><div class="vr" style="border:none;padding:0"><span class="vl" style="color:var(--orange)">Query</span><div class="vb">${bars}</div><div class="vn">[${nums}…]</div></div></div></div>`}
function updK(v){ST.k=parseInt(v);ST.ret=ST.sim.slice(0,ST.k);document.getElementById('kv').textContent=ST.k;document.querySelectorAll('#sR .smr').forEach((el,i)=>el.classList.toggle('top',i<ST.k));drawC()}
function resetAll(){Object.assign(ST,{step:0,raw:'',clean:'',ch:[],em:'tfidf',voc:[],emb:[],proj:[],q:'',qv:[],qp:null,sim:[],k:3,cm:'paragraph',ret:[],dn:new Set(),ll:false,ld:0,gp:'openrouter',gr:'',gl:false,_p1:null,_p2:null,_m:null});R()}

R();
</script>
</body>
</html>
